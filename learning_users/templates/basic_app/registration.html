{% extends "basic_app/base.html" %}

{% load static %}

{% block body_block %}

<div class="jumbotron">

    {% if registered %}
    <h1>Thank You for Registeration</h1>
    {% else %}
    
   
    <h1>Register Here</h1>
    <h1>Fill out The Form</h1>
    <form action="" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ user_form.as_p }}
        {{ profile_form.as_p }}
        <input type="submit" value="Register" class="btn btn-primary">        
    </form>
</div>
{% endif %}
{% endblock %}
